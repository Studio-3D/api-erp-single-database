version: 0.2

env:
  variables:
    REPOSITORY_URI: "403746501389.dkr.ecr.eu-west-1.amazonaws.com/erp-studio3d-api"

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin 403746501389.dkr.ecr.eu-west-1.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo IMAGE_TAG=$IMAGE_TAG

  build:
    commands:
      - echo Build started on `date`
      - docker build --no-cache -t $REPOSITORY_URI:$IMAGE_TAG .
      - docker push $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Updating Dockerrun with image tag...
      - printf '{"AWSEBDockerrunVersion":"1","Image":{"Name":"%s:%s","Update":"true"},"Ports":[{"ContainerPort":80}]}' $REPOSITORY_URI $IMAGE_TAG > Dockerrun.aws.json
      - cat Dockerrun.aws.json
      - echo Build completed on `date`

artifacts:
  files:
    - Dockerrun.aws.json
  discard-paths: true
