name: Laravel CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Debug PHP versions
      run: |
        ls -la /usr/bin/php*
        which php
        php -v || echo "PHP not available by default"
    
    - name: Setup PHP with simplified approach
      uses: shivammathur/setup-php@2.24.0
      with:
        php-version: '8.2'
        tools: composer:v2
    
    - name: Verify PHP installation
      run: |
        php -v
        php -m
    
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      
    - name: Generate key
      run: php artisan key:generate
      
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
      
    - name: Create Database for Testing
      run: |
        mkdir -p database
        touch database/database.sqlite
        
    - name: Execute tests with SQLite
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test --env=testing

  deploy:
    needs: laravel-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
          
      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/ec2-user/api_0.1
            git pull origin master
            
            # Make sure scripts are executable
            chmod +x start-prod.sh prod.sh
            
            # Stop any running containers
            docker compose -f docker-compose.prod.yml down
            
            # Build and start the production environment
            ./start-ssl-api.sh
            
            # Check if the containers are running
            docker ps
            
            echo "Deployment completed successfully!"
          EOF